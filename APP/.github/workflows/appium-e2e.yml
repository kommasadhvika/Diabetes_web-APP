name: Appium E2E Automation CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  e2e-tests:
    runs-on: macos-13 # Recommended host for nested virtualization / hardware acceleration of Android Emulator
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './mobile_automation/package.json'

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Appium & Drivers
        run: |
          npm install -g appium@latest
          appium driver install uiautomator2

      - name: Install Project Dependencies
        run: |
          cd mobile_automation
          npm install

      - name: Run E2E Tests on Android Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: |
            # Start Appium Server in the background
            appium --log-no-colors-log > appium.log 2>&1 &
            
            # Wait for Appium port 4723 to open
            echo "Waiting for Appium Server to launch..."
            until curl -sf http://127.0.0.1:4723/ > /dev/null; do
              sleep 2
            done
            echo "Appium Server is active!"
            
            # Navigate and run tests
            cd mobile_automation
            npm test
            
      - name: Upload Test Artifacts (Reports & Logs)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-test-reports
          path: |
            mobile_automation/excel/Mobile_E2E_Report.xlsx
            mobile_automation/reports/
            mobile_automation/screenshots/
            mobile_automation/logs/
            appium.log
          retries: 2
